name: Feature Request
description: Propose a new CLI capability or command shape
title: "[feature] "
labels:
  - enhancement
body:
  - type: textarea
    id: use_case
    attributes:
      label: Use case
      description: What are you trying to accomplish?
    validations:
      required: true
  - type: textarea
    id: command_shape
    attributes:
      label: Proposed command signature
      description: Show the command, subcommand, and flags you want.
      placeholder: stablecoin wallets export <wallet-id> --format csv
    validations:
      required: true
  - type: textarea
    id: notes
    attributes:
      label: Additional context
      description: Constraints, alternatives considered, or API details.
