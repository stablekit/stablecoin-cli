name: Bug Report
description: Report a CLI bug or regression
title: "[bug] "
labels:
  - bug
body:
  - type: textarea
    id: command
    attributes:
      label: Command run
      description: Paste the exact command and flags you ran.
      placeholder: stablecoin apps list --json
    validations:
      required: true
  - type: textarea
    id: steps
    attributes:
      label: Steps to reproduce
      description: Describe the smallest sequence that reproduces the bug.
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
    validations:
      required: true
  - type: textarea
    id: actual
    attributes:
      label: Actual behavior
    validations:
      required: true
  - type: input
    id: node
    attributes:
      label: Node version
      placeholder: 20.18.0
    validations:
      required: true
  - type: input
    id: os
    attributes:
      label: OS
      placeholder: macOS 15.3 / Ubuntu 24.04 / Windows 11
    validations:
      required: true
